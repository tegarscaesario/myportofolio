version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production        # pakai stage "production" (nginx)
    container_name: portfolio-web
    ports:
      - "3000:80"               # akses lewat http://localhost:3000
    restart: unless-stopped

